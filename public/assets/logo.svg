<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for clean rendering -->
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- OUTER TRIANGLE - LEFT SIDE (BLUE) -->
    <path d="M 256,24 L 96,330 A 48,48 0 0,0 144,378 L 256,378" 
          fill="none" 
          stroke="#1e56a0" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- OUTER TRIANGLE - RIGHT SIDE (ORANGE) -->
    <path d="M 256,24 L 416,330 A 48,48 0 0,1 368,378 L 256,378" 
          fill="none" 
          stroke="#f47a22" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- INNER 'A' SHAPE - LEFT ARM (BLUE) -->
    <path d="M 256,104 L 170,280 C 160,300 175,320 195,320 L 235,320" 
          fill="none" 
          stroke="#1e56a0" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- INNER 'A' SHAPE - RIGHT ARM (ORANGE) -->
    <path d="M 256,104 L 342,280 C 352,300 337,320 317,320 L 277,320" 
          fill="none" 
          stroke="#f47a22" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round" />

    <!-- THE HANDSHAKE (CENTER CROSSBAR) -->
    <!-- Left Hand / Cuff (Blue) -->
    <path d="M 210,240 L 246,240" 
          stroke="#1e56a0" 
          stroke-width="24" 
          stroke-linecap="round" />
          
    <!-- Right Hand / Cuff (Orange) -->
    <path d="M 302,240 L 266,240" 
          stroke="#f47a22" 
          stroke-width="24" 
          stroke-linecap="round" />

    <!-- Clasped Hands -->
    <!-- Blue Hand Clasping -->
    <path d="M 235,230 C 242,225 250,225 256,230 L 265,240 C 270,245 265,255 256,255 C 248,255 242,250 235,240 Z" 
          fill="#1e56a0" />
    <!-- Orange Hand Clasping -->
    <path d="M 277,230 C 270,225 262,225 256,230 L 247,240 C 242,245 247,255 256,255 C 264,255 270,250 277,240 Z" 
          fill="#f47a22" />

    <!-- THE SAVINGS POT (TOP CENTER SPACE) -->
    <!-- Pot Base -->
    <path d="M 236,170 C 236,155 276,155 276,170 C 276,182 236,182 236,170 Z" 
          fill="#c084fc" 
          stroke="#1e56a0" 
          stroke-width="4" />
    <path d="M 230,150 L 282,150 L 276,170 L 236,170 Z" 
          fill="#a855f7" 
          stroke="#1e56a0" 
          stroke-width="4" />
    <!-- Pot Belly -->
    <path d="M 226,132 C 226,110 286,110 286,132 C 286,152 226,152 226,132 Z" 
          fill="#d97706" 
          stroke="#1e56a0" 
          stroke-width="4" />
    <!-- Pot Stripes (Decorative Colorful Ribbon on Pot) -->
    <path d="M 232,132 C 232,125 280,125 280,132" 
          fill="none" 
          stroke="#ef4444" 
          stroke-width="4" />
    <path d="M 234,138 C 234,132 278,132 278,138" 
          fill="none" 
          stroke="#22c55e" 
          stroke-width="4" />
    <path d="M 236,144 C 236,138 276,138 276,144" 
          fill="none" 
          stroke="#eab308" 
          stroke-width="4" />
    <!-- Pot Lid / Top -->
    <ellipse cx="256" cy="116" rx="20" ry="6" 
             fill="#f59e0b" 
             stroke="#1e56a0" 
             stroke-width="4" />
    <circle cx="256" cy="106" r="6" 
            fill="#ef4444" 
            stroke="#1e56a0" 
            stroke-width="3" />
  </g>
</svg>
